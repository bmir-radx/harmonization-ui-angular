<div class="h-screen flex flex-col bg-background relative overflow-hidden">

    <!-- Main Content Container - Hidden during theme change -->
    <div class="h-full flex flex-col" [class.invisible]="themeService.isChangingTheme()">
        <app-header-bar></app-header-bar>

        <div class="flex-1 overflow-hidden">
            <p-splitter [panelSizes]="[15, 70, 15]" style="height:100%;" class="mb-8">
                <ng-template #panel>
                    <div class="h-full w-full">
                        <app-left-sidebar></app-left-sidebar>
                    </div>
                </ng-template>
                <ng-template #panel>
                    <div class="h-full w-full min-w-0 overflow-hidden">
                        <app-main-content></app-main-content>
                    </div>
                </ng-template>
                <ng-template #panel>
                    <div class="h-full w-full">
                        <app-right-sidebar></app-right-sidebar>
                    </div>
                </ng-template>
            </p-splitter>
        </div>

        <app-project-selection-modal *ngIf="!project()"></app-project-selection-modal>
        <p-toast position="bottom-right"></p-toast>
    </div>

    <!-- Theme Switch Loading Overlay - At the very end with absolute max Z-Index -->
    <div *ngIf="themeService.isChangingTheme()" class="theme-switch-overlay transition-opacity duration-300">
        <div class="flex flex-col items-center animate-pulse">
            <i class="pi pi-spinner pi-spin text-primary" style="font-size: 3.5rem"></i>
            <span class="mt-6 text-foreground font-semibold text-xl tracking-wider">Syncing Theme...</span>
            <p class="mt-2 text-muted-foreground text-sm font-medium">Updating data grids and components</p>
        </div>
    </div>
</div>
