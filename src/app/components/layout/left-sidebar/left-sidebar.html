<div class="w-full h-full bg-[#2d2d30] border-r border-[#3c3c3c] flex flex-col">
    <!-- Header -->
    <div class="px-4 py-3 border-b border-[#3c3c3c] shrink-0">
        <div class="flex items-center justify-between">
            <h2 class="text-base font-medium text-[#cccccc] truncate">Source Datasets</h2>

            <button class="p-1 text-[#007fd4] hover:bg-[#3c3c3c] rounded transition-colors shrink-0" [pTooltip]="tooltipContent" tooltipPosition="bottom" positionTop="10">
                <i class="pi pi-upload w-4 h-4" style="--p-icon-size: 16px;"></i>
            </button>
        </div>
    </div>

    <!-- SearchAndControls component -->
    <div class="p-3 border-b border-[#3c3c3c] shrink-0 space-y-2">

        <!-- Search Box -->
        <div class="bg-[#252526] border border-[#3c3c3c] rounded px-3 py-1.5 flex items-center gap-2">
            <svg class="w-4 h-4 text-[#808080] shrink-0" fill="none" viewBox="0 0 16 16">
            <path
                d="M6.5 12C9.53757 12 12 9.53757 12 6.5C12 3.46243 9.53757 1 6.5 1C3.46243 1 1 3.46243 1 6.5C1 9.53757 3.46243 12 6.5 12Z"
                stroke="currentColor"
                strokeWidth="1.33333"
                strokeLinecap="round"
                strokeLinejoin="round"
            />
            <path
                d="M14 14L11.1 11.1"
                stroke="currentColor"
                strokeWidth="1.33333"
                strokeLinecap="round"
                strokeLinejoin="round"
            />
            </svg>
            <input
                type="text"
                placeholder="Search source data elements..."
                class="bg-transparent text-[#cccccc] text-sm outline-none flex-1 placeholder-[#808080] min-w-0"
            />
        </div>

        <!-- Controls Row -->
        <div class="flex items-center justify-between">
            <div class="flex items-center gap-1">

            <!-- SortingControls component -->
            <button class="h-8 px-2 text-[#cccccc] hover:bg-[#3c3c3c] hover:text-[#cccccc] border-none bg-transparent rounded cursor-pointer flex items-center justify-center transition-colors">
                <i class="pi pi-sort-amount-up-alt w-4 h-4" style="--p-icon-size: 16px;"></i>
            </button>

            <!-- FilteringControls component -->
            <button
                class="h-8 px-2 border-none bg-transparent rounded cursor-pointer flex items-center justify-center transition-colors"
                [ngClass]="hasActiveFilters ? 'text-[#007fd4] hover:bg-[#007fd4] hover:bg-opacity-10 hover:text-[#007fd4]' : 'text-[#6b7280] hover:bg-[#007fd4] hover:bg-opacity-10 hover:text-[#007fd4]'"
            >
                <i class="pi pi-filter w-4 h-4" style="--p-icon-size: 16px;"></i>
            </button>

        </div>
        
        <!-- Results count indicator -->

    </div>

    <!-- Datasets Container -->
    <div class="flex-1 overflow-auto">
        <div class="min-w-max">

            <!-- Empty State -->
            <div class="text-center py-8 px-3">
                <div class="w-12 h-12 bg-[#3c3c3c] rounded-full flex items-center justify-center mx-auto mb-3">
                    <i class="pi pi-database w-6 h-6 text-[#007fd4]" style="--p-icon-size: 24px;"></i>
                </div>
                <h3 class="text-[#cccccc] font-medium mb-2 text-sm">No Source Datasets</h3>
                <p class="text-[#808080] text-xs mb-4 break-words leading-relaxed px-1">
                    Upload your source data files to get started
                </p>
                <button
                    class="bg-[#007fd4] text-white px-3 py-2 rounded text-xs hover:bg-[#005fa3] transition-colors flex items-center gap-1 mx-auto"
                    [pTooltip]="tooltipContent" tooltipPosition="top" positionTop="-10"
                >
                    <i class="pi pi-upload w-3 h-3" style="--p-icon-size: 12px;"></i>
                    Upload Dataset
                </button>
                <ng-template #tooltipContent>
                    <div class="bg-primary text-primary-foreground animate-in fade-in-0 zoom-in-95 data-[state=closed]:animate-out data-[state=closed]:fade-out-0 data-[state=closed]:zoom-out-95 data-[side=bottom]:slide-in-from-top-2 data-[side=left]:slide-in-from-right-2 data-[side=right]:slide-in-from-left-2 data-[side=top]:slide-in-from-bottom-2 z-50 w-fit origin-(--radix-tooltip-content-transform-origin) rounded-md px-3 py-1.5 text-xs text-balance">
                        <p>Upload Source Data Files</p>
                        <p class="text-xs text-muted-foreground">Supports CSV, Excel (.xlsx)</p>
                    </div>
                </ng-template>
            </div>

        </div>
    </div>
</div>
