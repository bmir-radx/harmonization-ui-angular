<div class="w-full h-full bg-sidebar border-r border-sidebar flex flex-col">
    <!-- Header -->
    <div class="px-4 py-3 border-b border-sidebar shrink-0">
        <div class="flex items-center justify-between">
            <h2 class="text-base font-medium text-foreground truncate">Source Datasets</h2>

            <button (click)="datasetService.openFileDialog()"
                class="p-1 text-[#007fd4] hover:bg-muted rounded transition-colors shrink-0" [pTooltip]="tooltipContent"
                tooltipPosition="bottom" positionTop="10">
                <i class="pi pi-upload w-4 h-4" style="--p-icon-size: 16px;"></i>
            </button>
        </div>
    </div>

    <!-- SearchAndControls component -->
    <div class="p-3 border-b border-sidebar shrink-0 space-y-2">

        <!-- Search Box -->
        <div class="bg-background border border-sidebar rounded px-3 py-1.5 flex items-center gap-2">
            <svg class="w-4 h-4 text-muted-foreground shrink-0" fill="none" viewBox="0 0 16 16">
                <path
                    d="M6.5 12C9.53757 12 12 9.53757 12 6.5C12 3.46243 9.53757 1 6.5 1C3.46243 1 1 3.46243 1 6.5C1 9.53757 3.46243 12 6.5 12Z"
                    stroke="currentColor" strokeWidth="1.33333" strokeLinecap="round" strokeLinejoin="round" />
                <path d="M14 14L11.1 11.1" stroke="currentColor" strokeWidth="1.33333" strokeLinecap="round"
                    strokeLinejoin="round" />
            </svg>
            <input type="text" placeholder="Search source data elements..."
                class="bg-transparent text-foreground text-sm outline-none flex-1 placeholder-muted-foreground min-w-0" />
        </div>

        <!-- Controls Row -->
        <div class="flex items-center justify-between">
            <div class="flex items-center gap-1">

                <!-- SortingControls component -->
                <button
                    class="h-8 px-2 text-foreground hover:bg-muted hover:text-foreground border-none bg-transparent rounded cursor-pointer flex items-center justify-center transition-colors">
                    <i class="pi pi-sort-amount-up-alt w-4 h-4" style="--p-icon-size: 16px;"></i>
                </button>

                <!-- FilteringControls component -->
                <button
                    class="h-8 px-2 border-none bg-transparent rounded cursor-pointer flex items-center justify-center transition-colors"
                    [ngClass]="hasActiveFilters ? 'text-[#007fd4] hover:bg-[#007fd4] hover:bg-opacity-10 hover:text-[#007fd4]' : 'text-muted-foreground hover:bg-[#007fd4] hover:bg-opacity-10 hover:text-[#007fd4]'">
                    <i class="pi pi-filter w-4 h-4" style="--p-icon-size: 16px;"></i>
                </button>

            </div>
        </div>
    </div>

    <!-- Datasets Container -->
    <div class="flex-1 overflow-auto">
        <div class="min-w-max">

            <!-- Empty State -->
            <div *ngIf="!datasetService.hasFiles()" class="text-center py-8 px-3">
                <div class="w-12 h-12 bg-muted rounded-full flex items-center justify-center mx-auto mb-3">
                    <i class="pi pi-database w-6 h-6 text-[#007fd4]" style="--p-icon-size: 24px;"></i>
                </div>
                <h3 class="text-foreground font-medium mb-2 text-sm">No Source Datasets</h3>
                <p class="text-muted-foreground text-xs mb-4 break-words leading-relaxed px-1">
                    Upload your source data files to get started
                </p>
                <button (click)="datasetService.openFileDialog()"
                    class="bg-[#007fd4] text-white px-3 py-2 rounded text-xs hover:bg-[#005fa3] transition-colors flex items-center gap-1 mx-auto"
                    [pTooltip]="tooltipContent" tooltipPosition="top" positionTop="-10">
                    <i class="pi pi-upload w-3 h-3" style="--p-icon-size: 12px;"></i>
                    Upload Dataset
                </button>
            </div>

            <ng-template #tooltipContent>
                <div
                    class="bg-primary text-primary-foreground animate-in fade-in-0 zoom-in-95 data-[state=closed]:animate-out data-[state=closed]:fade-out-0 data-[state=closed]:zoom-out-95 data-[side=bottom]:slide-in-from-top-2 data-[side=left]:slide-in-from-right-2 data-[side=right]:slide-in-from-left-2 data-[side=top]:slide-in-from-bottom-2 z-50 w-fit origin-(--radix-tooltip-content-transform-origin) rounded-md px-3 py-1.5 text-xs text-balance">
                    <p>Upload Source Data Files</p>
                    <p class="text-xs text-muted-foreground">Supports CSV, Excel (.xlsx)</p>
                </div>
            </ng-template>

            <!-- Has Uploaded Files -->
            <div *ngIf="datasetService.hasFiles()" class="space-y-1 min-w-max pt-2">
                <p-tree [value]="getFiles()" selectionMode="single" [(selection)]="selectedFolder"
                    (onNodeSelect)="onNodeSelect($event)" (onNodeUnselect)="datasetService.clearFolder()">
                    <ng-template let-node pTemplate="folder">
                        <div class="flex items-center gap-2 p-2 cursor-pointer whitespace-nowrap sidebar-item"
                            [ngClass]="{'active': selectedFolder === node}">
                            <i class="pi pi-folder-open w-5 h-5 text-[#007FD4]" style="--p-icon-size: 20px;"></i>
                            <div class="flex-1 min-w-0">
                                <div class="font-medium truncate">{{node.label}}</div>
                            </div>
                        </div>
                    </ng-template>
                    <ng-template let-node pTemplate="file">
                        <div class="flex items-center gap-2 p-2 whitespace-nowrap cursor-pointer sidebar-item"
                            [ngClass]="{'active': datasetService.activeFile()?.name === node.file?.name}"
                            (dblclick)="datasetService.openFile(node.file)">
                            <i *ngIf="node.subtype === 'data'" class="pi pi-table w-4 h-4 text-[#569cd6] shrink-0"
                                style="--p-icon-size: 16px;"></i>
                            <i *ngIf="node.subtype === 'json'" class="pi pi-code w-4 h-4 text-[#569cd6] shrink-0"
                                style="--p-icon-size: 16px;"></i>
                            <i *ngIf="node.subtype === 'text'" class="pi pi-file-edit w-4 h-4 text-[#569cd6] shrink-0"
                                style="--p-icon-size: 16px;"></i>
                            <i *ngIf="node.subtype === 'rules'" class="pi pi-code w-4 h-4 text-[#569cd6] shrink-0"
                                style="--p-icon-size: 16px;"></i>
                            <i *ngIf="node.subtype === 'replay'" class="pi pi-history w-4 h-4 text-[#569cd6] shrink-0"
                                style="--p-icon-size: 16px;"></i>
                            <div *ngIf="node.subtype === 'dictionary'" class="w-4 h-4 shrink-0">
                                <div class="relative size-full" data-name="Component 1">
                                    <svg class="block size-full" fill="none" preserveAspectRatio="none"
                                        viewBox="0 0 16 16">
                                        <g id="Component 1">
                                            <path
                                                d="M2.66667 13V3C2.66667 2.55797 2.84226 2.13405 3.15482 1.82149C3.46738 1.50893 3.89131 1.33333 4.33333 1.33333H13.3333V14.6667H4.33333C3.89131 14.6667 3.46738 14.4911 3.15482 14.1785C2.84226 13.866 2.66667 13.442 2.66667 13ZM2.66667 13C2.66667 12.558 2.84226 12.134 3.15482 11.8215C3.46738 11.5089 3.89131 11.3333 4.33333 11.3333H13.3333"
                                                id="Vector" stroke="var(--stroke-0, oklch(0.85 0.05 100))"
                                                stroke-linecap="round" stroke-linejoin="round" stroke-width="1.33333">
                                            </path>
                                        </g>
                                    </svg>
                                </div>
                            </div>
                            <div class="flex-1 min-w-0">
                                <div class="text-sm truncate">{{node.label}}</div>
                            </div>
                        </div>
                    </ng-template>
                    <ng-template let-node pTemplate="field">
                        <div
                            class="flex items-center gap-3 py-1 px-2 text-sm whitespace-nowrap cursor-pointer sidebar-item">
                            <div class="relative w-4 h-4">
                                <div class="relative w-full h-full">
                                    <div
                                        class="box-border content-stretch flex flex-col items-center justify-center relative w-full h-full">
                                        <div class="font-['Inter:Bold',_sans-serif] font-bold leading-[0] not-italic relative shrink-0 text-[14px] text-center"
                                            [ngClass]="mappingService.getDataClass(node.datatype)">
                                            <p class="block leading-[normal] whitespace-pre">
                                                {{mappingService.getDataChar(node.datatype)}}</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <span class="flex-1 truncate">{{node.field}}</span>
                        </div>
                    </ng-template>
                    <ng-template let-node pTemplate="default">
                        <b>{{ node.label }}</b>
                    </ng-template>
                </p-tree>
            </div>
        </div>
    </div>
</div>
