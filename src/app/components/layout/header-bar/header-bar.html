<div class="h-10 border-b flex items-center justify-between px-4 flex-shrink-0"
    [ngClass]="isDarkMode ? 'bg-[#252526] border-[#3c3c3c]' : 'bg-white border-gray-200'" style="font-size: 0.8125rem;">

    <!-- Left side - Logo, App Name, Project, and Menus -->
    <div class="flex items-center gap-2">

        <!-- Always show Harmonizer logo and name -->
        <div class="flex items-center gap-2">
            <svg class="w-4 h-4" viewBox="0 0 18 18">
                <path d="M12 13.5L16.5 9L12 4.5" stroke="#007FD4" strokeWidth="1.5" strokeLinecap="round"
                    strokeLinejoin="round" fill="none" />
                <path d="M6 4.5L1.5 9L6 13.5" stroke="#007FD4" strokeWidth="1.5" strokeLinecap="round"
                    strokeLinejoin="round" fill="none" />
            </svg>
            <span class="font-medium" [ngClass]="isDarkMode ? 'text-[#cccccc]' : 'text-gray-700'">Harmonizer</span>
        </div>

        <!-- Project selector when project is selected -->
        <div class="h-4 w-px" [ngClass]="isDarkMode ? 'bg-[#3c3c3c]' : 'bg-gray-300'"></div>

        <p-menubar [model]="leftMenu">
            <ng-template #item let-item let-root="root">
                <a pRipple *ngIf="!item.title" class="flex items-center"
                    [ngClass]="[root ? 'gap-1 px-2 py-1 rounded text-sm transition-colors' : 'gap-3 px-3 py-2', isDarkMode ? (root ? 'text-[#cccccc] hover:bg-[#3c3c3c]' : 'hover:bg-[#3c3c3c] text-[#cccccc]') : (root ? 'text-gray-700 hover:bg-gray-100' : 'hover:bg-gray-50 text-gray-700')]">
                    <span *ngIf="item.icon && !item.lastModified" class="w-4 h-4" [ngClass]="item.icon"></span>
                    <div *ngIf="item.lastModified"
                        class="w-6 h-6 rounded flex items-center justify-center flex-shrink-0"
                        [ngClass]="isDarkMode ? 'bg-[#007fd4]/10' : 'bg-blue-50'">
                        <span class="w-3 h-3 pi pi-file"
                            [ngClass]="isDarkMode ? 'text-[#007fd4]' : 'text-blue-600'"></span>
                    </div>
                    <span *ngIf="root" class="truncate max-w-[160px]">
                        {{ item.label }}
                    </span>
                    <div *ngIf="!root && !item.lastModified">
                        <div [ngClass]="root ? '' : 'font-medium text-sm'">{{ item.label }}</div>
                        <div *ngIf="item.sublabel" class="text-xs"
                            [ngClass]="isDarkMode ? 'text-[#a0a0a0]' : 'text-gray-500'">{{ item.sublabel }}</div>
                    </div>
                    <div *ngIf="item.lastModified" class="flex-1 min-w-0 w-64">
                        <div class="font-medium text-sm truncate">{{ item.label }}</div>
                        <div class="flex items-center gap-2 text-xs">
                            <span class="w-3 h-3 pi pi-clock"
                                [ngClass]="isDarkMode ? 'text-[#808080]' : 'text-gray-400'"></span>
                            <span [ngClass]="isDarkMode ? 'text-[#808080]' : 'text-gray-500'">{{
                                formatDate(item.lastModified) }}</span>
                        </div>
                    </div>
                    <span *ngIf="item.shortcut" class="ml-auto text-xs"
                        [ngClass]="isDarkMode ? 'text-[#808080]' : 'text-gray-400'">{{ item.shortcut }}</span>
                    <i *ngIf="item.items && !['File', 'View'].includes(item.label)"
                        [ngClass]="['ml-auto pi', root ? 'pi-angle-down' : 'pi-angle-right']"></i>
                </a>
                <div *ngIf="item.title" class="px-3 py-2 text-xs font-medium"
                    [ngClass]="isDarkMode ? 'text-[#a0a0a0]' : 'text-gray-500'">
                    {{ item.title }}
                </div>
            </ng-template>
        </p-menubar>

    </div>

    <!-- Right side - User menu, Search, and Settings -->
    <div class="flex items-center gap-1">
        <p-menubar [model]="rightMenu">
            <ng-template #item let-item let-root="root">
                <a pRipple *ngIf="!item.title" class="flex items-center"
                    [ngClass]="[root ? 'gap-1 px-2 py-1 rounded text-sm transition-colors' : 'gap-3 px-3 py-2', isDarkMode ? (root ? 'text-[#cccccc] hover:bg-[#3c3c3c]' : 'hover:bg-[#3c3c3c] text-[#cccccc]') : (root ? 'text-gray-700 hover:bg-gray-100' : 'hover:bg-gray-50 text-gray-700')]">
                    <span *ngIf="item.icon" class="w-4 h-4" [ngClass]="item.icon"></span>
                    <div *ngIf="item.label" [ngClass]="root ? '' : 'font-medium text-sm'">{{ item.label }}</div>
                    <span *ngIf="item.shortcut" class="ml-auto text-xs"
                        [ngClass]="isDarkMode ? 'text-[#808080]' : 'text-gray-400'">{{ item.shortcut }}</span>
                </a>
                <div *ngIf="item.title" class="px-3 py-2 text-xs font-medium"
                    [ngClass]="isDarkMode ? 'text-[#a0a0a0]' : 'text-gray-500'">
                    {{ item.title }}
                </div>
            </ng-template>
        </p-menubar>
    </div>
</div>
