name: Publish Electron Release

on:
  push:
    tags:
      - 'v*' # Trigger on tags like v1.0.0, v2.1.3

jobs:
  release:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            targetOs: mac
            buildScript: pack:mac
            sidecarArtifact: harmonization-sidecar-mac
            isZip: false
          - os: windows-latest
            targetOs: win
            buildScript: pack:win
            sidecarArtifact: harmonization-sidecar-win
            isZip: true
          - os: ubuntu-latest
            targetOs: linux
            buildScript: pack:linux
            sidecarArtifact: harmonization-sidecar-linux
            isZip: false

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      # Fetch the latest sidecar build from the framework repo
      - name: Download Framework Sidecar
        uses: dawidd6/action-download-artifact@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          repo: bmir-radx/harmonization-framework
          workflow: sidecar-packaging.yml
          name: ${{ matrix.sidecarArtifact }}
          path: resources/temp-sidecar
          search_artifacts: true

      - name: Extract Sidecar
        shell: bash
        run: |
          mkdir -p resources/sidecar/${{ matrix.targetOs }}/
          
          if [ "${{ matrix.isZip }}" = "true" ]; then
            # Windows artifact is a zip
            unzip -o resources/temp-sidecar/* -d resources/sidecar/${{ matrix.targetOs }}/ || echo "Failed to unzip but continuing..."
          else
            # Mac and Linux artifacts are tar.gz
            tar -xzf resources/temp-sidecar/* -C resources/sidecar/${{ matrix.targetOs }}/ || echo "Failed to untar but continuing..."
          fi

      - name: Build and Publish Electron App
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npm run ${{ matrix.buildScript }} -- --publish always
