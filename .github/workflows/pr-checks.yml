name: PR Checks & Tests

on:
  pull_request:
    branches: [ "dev", "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Angular Type Check & Build
        run: npm run build

      - name: Run Unit Tests
        run: npm run test:coverage -- --browsers=ChromeHeadless
